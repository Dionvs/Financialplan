<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dion & Dara — Budget Planner</title>
<style>
:root{
  --bg:#0a0f1c;
  --bg-soft:#0d1526;
  --card:#121b2e;
  --card-hover:#16213a;
  --border:#1f2b45;
  --border-soft:#182238;
  --text:#e7ecf7;
  --text-dim:#8b97b3;
  --text-faint:#5b6785;
  --navy:#3b6fe0;
  --navy-bright:#5b8dff;
  --navy-deep:#152447;
  --green:#34d399;
  --green-bg:rgba(52,211,153,.12);
  --red:#f87171;
  --red-bg:rgba(248,113,113,.12);
  --amber:#fbbf24;
  --radius:16px;
  --radius-sm:10px;
  --shadow: 0 8px 30px rgba(0,0,0,.35);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(59,111,224,.16), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(91,141,255,.10), transparent 55%),
    var(--bg);
  min-height:100vh;
  padding-bottom:28px;
}
::selection{background:rgba(91,141,255,.35);}
input, select{
  font-family:inherit; color:var(--text); background:var(--bg-soft);
  border:1px solid var(--border); border-radius:8px; padding:5px 7px; font-size:12.5px;
  outline:none; transition:border-color .15s, box-shadow .15s;
}
input:focus, select:focus{ border-color:var(--navy-bright); box-shadow:0 0 0 3px rgba(91,141,255,.18); }
input[type=number]{ text-align:right; width:100px; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
input[type=text]{ width:100%; }
input[type=date]{ color-scheme: dark; }
input[type=checkbox]{ width:16px; height:16px; accent-color:var(--navy-bright); cursor:pointer; }
textarea{
  width:100%; min-height:112px; resize:vertical; font-family:ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  color:var(--text); background:var(--bg-soft); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:12px;
}
code, pre{ font-family:ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
pre{ white-space:pre-wrap; background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:8px; padding:8px; font-size:11.5px; color:var(--text-dim); }
button{
  font-family:inherit; cursor:pointer; border:1px solid var(--border);
  background:var(--card); color:var(--text); border-radius:9px; padding:6px 11px;
  font-size:12.5px; font-weight:600; transition:.15s;
}
button:hover{ background:var(--card-hover); border-color:var(--navy-bright); }
button.primary{ background:linear-gradient(135deg, var(--navy), var(--navy-bright)); border:none; color:#fff; }
button.primary:hover{ filter:brightness(1.08); }
button.ghost{ background:transparent; border:1px dashed var(--border); color:var(--text-dim); }
button.danger-ghost{ background:transparent; border:1px solid transparent; color:var(--text-faint); padding:3px 6px; font-size:15px; line-height:1; }
button.danger-ghost:hover{ color:var(--red); border-color:var(--red); background:var(--red-bg); }
button.small{ padding:4px 8px; font-size:12px; }

.topbar{
  position:sticky; top:0; z-index:20;
  background:rgba(10,15,28,.85); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
  padding:10px 18px;
}
.topbar-inner{ max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:10px; }
.brand-dot{ width:10px; height:10px; border-radius:50%; background:var(--navy-bright); box-shadow:0 0 12px var(--navy-bright); }
.brand h1{ font-size:16px; margin:0; font-weight:700; letter-spacing:.2px; }
.save-status{ font-size:11.5px; color:var(--text-faint); }

.scenario-toggle{ display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:4px; }
.scenario-toggle button{ border:none; background:transparent; border-radius:999px; padding:6px 14px; font-size:12.5px; color:var(--text-dim); }
.scenario-toggle button.active{ background:linear-gradient(135deg, var(--navy), var(--navy-bright)); color:#fff; }

.tabs{ max-width:1100px; margin:10px auto 0; padding:0 18px; display:flex; gap:6px; flex-wrap:wrap; }
.tab-btn{ background:transparent; border:1px solid var(--border-soft); color:var(--text-dim); border-radius:10px; padding:7px 12px; font-size:12.5px; }
.tab-btn.active{ background:var(--card); color:var(--text); border-color:var(--navy-bright); box-shadow:0 0 0 1px rgba(91,141,255,.25) inset; }

.wrap{ max-width:1100px; margin:14px auto; padding:0 18px; display:none; }
.wrap.active{ display:block; }

.card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 14px 12px; margin-bottom:12px; box-shadow:var(--shadow);
}
.card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; gap:8px; flex-wrap:wrap; }
.card-head h2{ font-size:14.5px; margin:0; font-weight:700; color:var(--text); }
.card-head .hint{ font-size:11.5px; color:var(--text-faint); }

.kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:9px; }
.kpi{
  background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:10px 12px; position:relative; overflow:hidden;
}
.kpi::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--navy-bright); }
.kpi.pos::before{ background:var(--green); }
.kpi.neg::before{ background:var(--red); }
.kpi .label{ font-size:10.5px; color:var(--text-dim); margin-bottom:5px; }
.kpi .value{ font-size:17px; font-weight:700; }
.kpi .value.pos{ color:var(--green); }
.kpi .value.neg{ color:var(--red); }

table{ width:100%; border-collapse:collapse; }
th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:5px 6px; border-bottom:1px solid var(--border); }
td{ padding:5px 6px; border-bottom:1px solid var(--border-soft); font-size:12.5px; vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
td.num{ text-align:right; }
.tot-row td{ font-weight:700; border-top:1px solid var(--border); border-bottom:none; padding-top:8px; }
.tot-row .value.pos{ color:var(--green); }
.tot-row .value.neg{ color:var(--red); }
.row-actions{ text-align:center; width:30px; }
.add-row-btn{ margin-top:8px; }
.list-summary{
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:8px 10px; margin-bottom:8px;
}
.list-summary strong{ font-size:13px; }
.list-summary .hint{ font-size:11.5px; color:var(--text-faint); }
.move-select{ width:116px; padding:4px 6px; font-size:12px; }

.progress-track{ background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:999px; height:9px; overflow:hidden; width:100%; min-width:70px; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--navy), var(--navy-bright)); border-radius:999px; }
.progress-label{ font-size:11px; color:var(--text-dim); margin-top:3px; text-align:right; }

.donut-row{ display:flex; gap:14px; flex-wrap:wrap; }
.donut{
  width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background: conic-gradient(var(--navy-bright) calc(var(--pct,0)*1%), var(--border-soft) 0);
  flex:0 0 auto;
}
.donut-inner{ width:62px; height:62px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; flex-direction:column; }
.donut-inner b{ font-size:14px; }
.donut-inner span{ font-size:9.5px; color:var(--text-faint); }
.donut-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; width:96px; }
.donut-wrap .name{ font-size:12px; color:var(--text-dim); text-align:center; }

.goal{
  background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:12px 14px; margin-bottom:10px;
}
.goal-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.goal-name-input{ font-weight:700; font-size:14px; border:none; background:transparent; padding:2px 0; width:auto; min-width:80px; }
.goal-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:8px; }
.goal-grid label{ display:block; font-size:10.5px; color:var(--text-faint); margin-bottom:3px; }
.goal-grid input{ width:100%; }
.goal-stats{ display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--text-dim); margin-top:6px; }
.goal-stats b{ color:var(--text); }

.section-title{ font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin:18px 0 8px; padding-top:3px; border-top:1px solid var(--border-soft); }
.section-title:first-child{ border-top:none; margin-top:0; }

.footer-note{ text-align:center; color:var(--text-faint); font-size:11px; margin-top:18px; }
.toolbar{ display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
.compact-layout{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; align-items:start; }
.compact-layout .card{ padding:12px; margin-bottom:0; box-shadow:none; overflow-x:visible; }
.compact-layout .card-head{ margin-bottom:7px; }
.compact-layout th{ padding:5px 6px; font-size:10px; }
.compact-layout td{ padding:5px 6px; font-size:12.5px; }
.compact-layout input{ padding:6px 7px; font-size:12.5px; }
.compact-layout input[type=number]{ width:82px; }
.compact-layout .add-row-btn{ margin-top:8px; }
.savings-panel{ margin-top:12px; }
.savings-head{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:9px; margin-bottom:10px; }
.goal-table-wrap{ overflow-x:visible; }
.goal-table{ table-layout:fixed; }
.goal-table th{ white-space:normal; line-height:1.25; padding:5px 4px; font-size:10px; }
.goal-table td{ padding:5px 4px; font-size:12px; }
.goal-table input{ padding:6px 7px; font-size:12px; }
.goal-table input[type=text]{ min-width:0; width:100%; }
.goal-table input[type=number]{ width:100%; min-width:58px; }
.goal-table input[type=date]{ width:100%; min-width:112px; }
.goal-table .progress-track{ min-width:54px; margin-top:4px; }
.goal-table tfoot td{ font-weight:700; border-top:1px solid var(--border); padding-top:10px; }
.goal-table .col-name{ width:12%; }
.goal-table .col-money{ width:9%; }
.goal-table .col-progress{ width:9%; }
.goal-table .col-date{ width:12%; }
.goal-table .col-rate{ width:8%; }
.goal-table .col-actions{ width:32px; }
.goal-summary-row{ display:flex; justify-content:space-between; gap:12px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); font-weight:700; }

@media (max-width:640px){
  .topbar-inner{ flex-direction:column; align-items:stretch; }
  .goal-grid{ grid-template-columns:repeat(2,1fr); }
  .compact-layout{ grid-template-columns:1fr; }
  .compact-layout .card{ padding:12px; }
  .goal-table-wrap{ overflow-x:auto; }
  .goal-table{ min-width:760px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>Dion &amp; Dara — Budget Planner</h1>
        <div class="save-status" id="saveStatus">Lokaal opgeslagen op dit toestel</div>
      </div>
    </div>
    <div class="scenario-toggle" id="scenarioToggle">
      <button data-scenario="voor">Voor verkoop</button>
      <button data-scenario="na">Na verkoop</button>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="gezamenlijk">Gezamenlijk</button>
    <button class="tab-btn" data-tab="dion">Dion</button>
    <button class="tab-btn" data-tab="dara">Dara</button>
    <button class="tab-btn" data-tab="spaardoelen">Spaardoelen</button>
    <button class="tab-btn" data-tab="data">Data &amp; back-up</button>
  </div>
</div>

<div class="wrap" id="tab-dashboard"></div>
<div class="wrap" id="tab-gezamenlijk"></div>
<div class="wrap" id="tab-dion"></div>
<div class="wrap" id="tab-dara"></div>
<div class="wrap" id="tab-spaardoelen"></div>
<div class="wrap" id="tab-data"></div>

<div class="footer-note">Alles wordt lokaal op dit toestel bewaard (localStorage). Niets wordt naar een server verstuurd.</div>

<script>
/* =========================================================
   Dion & Dara — Budget Planner (lokale HTML-versie)
   Rekenmotor is 1-op-1 gebaseerd op de formules uit het
   originele Excel-werkboek (V29).
   ========================================================= */

/* ---------- helpers ---------- */
function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }
function eur(n){
  if (n === null || n === undefined || isNaN(n)) return '€ -';
  const sign = n < 0 ? '-' : '';
  return sign + '€ ' + Math.abs(n).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n){ return (Math.round((n||0)*1000)/10) + '%'; }
function percentInputValue(n){
  if (n === null || n === undefined || isNaN(n)) return '';
  return round2((Number(n)||0) * 100);
}
function uid(){ return 'id' + Math.random().toString(36).slice(2,10); }
function formatDateNL(value){
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d)) return value;
  return String(d.getDate()).padStart(2,'0') + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + d.getFullYear();
}
function getPath(obj, path){
  return path.split('.').reduce((o,k)=> (o==null?o:o[k]), obj);
}
function setPath(obj, path, value){
  const keys = path.split('.');
  let o = obj;
  for (let i=0;i<keys.length-1;i++) o = o[keys[i]];
  o[keys[keys.length-1]] = value;
}
function sumBedrag(list){
  return round2((list||[]).reduce((s,r)=> s + (Number(r.bedrag)||0), 0));
}
function effectiveBedrag(row){
  const b = Number(row.bedrag)||0;
  return row.jaarlijks ? b/12 : b;
}
function sumEffective(list){
  return round2((list||[]).reduce((s,r)=> s + effectiveBedrag(r), 0));
}
const CATEGORY_ICONS = [
  [/huis|hypotheek|vve/i, '🏠'],
  [/water/i, '💧'],
  [/energie|eneco|gas|stroom/i, '⚡'],
  [/verzeker/i, '🛡️'],
  [/belasting/i, '📄'],
  [/entertainment|netflix|prime|disney|spotify/i, '🎬'],
  [/internet|telefoon/i, '📶'],
  [/pensioen/i, '💼'],
  [/schuld|correctie|duo/i, '💳'],
  [/inkomsten/i, '💶'],
  [/variabel|boodschap|benzine|uitjes|kleding/i, '🛒'],
  [/overig/i, '📦'],
];
function categoryIcon(categorie){
  const c = String(categorie||'');
  for (const [re, icon] of CATEGORY_ICONS) if (re.test(c)) return icon;
  return '•';
}

/* ---------- rekenmotor ---------- */
function monthsRemaining(targetDateStr, today){
  if (!targetDateStr) return null;
  const t = new Date(targetDateStr);
  if (isNaN(t)) return null;
  const months = (t.getFullYear()-today.getFullYear())*12 + (t.getMonth()-today.getMonth());
  return Math.max(1, months);
}
function futureValue(current, monthlyFixed, annualRate, months){
  current = current || 0; monthlyFixed = monthlyFixed || 0;
  if (!annualRate) return current + monthlyFixed*months;
  const i = annualRate/12;
  const growth = Math.pow(1+i, months);
  return current*growth + monthlyFixed*((growth-1)/i);
}
function calcDoel(doel, today){
  const doelbedrag = Number(doel.doelbedrag)||0;
  const algespaard = Number(doel.algespaard)||0;
  const vasteInleg = Number(doel.vasteInleg)||0;
  const rendement = Number(doel.rendement)||0;
  const nogTeGaan = Math.max(0, doelbedrag - algespaard);
  const voortgang = doelbedrag>0 ? algespaard/doelbedrag : 0;
  let benodigdPerMaand = null, benodigdeExtraInleg = null, verwachteWaarde = null;
  const months = monthsRemaining(doel.doeldatum, today);
  if (months !== null && doelbedrag > 0){
    const fv = futureValue(algespaard, vasteInleg, rendement, months);
    verwachteWaarde = round2(fv);
    const tekort = doelbedrag - fv;
    if (!rendement){ benodigdeExtraInleg = round2(Math.max(0, tekort/months)); }
    else{
      const i = rendement/12;
      const annuiteit = (Math.pow(1+i,months)-1)/i;
      benodigdeExtraInleg = round2(Math.max(0, tekort/annuiteit));
    }
    benodigdPerMaand = round2(vasteInleg + benodigdeExtraInleg);
  }
  return { nogTeGaan, voortgang, benodigdPerMaand, benodigdeExtraInleg, verwachteWaarde, months };
}
function calcGroep(doelen, spaarpotDezeMaand, today){
  const berekend = doelen.map(d => ({ doel:d, ...calcDoel(d, today) }));
  // Vaste inleg van ALLE doelen (ook 'alleen vast bedrag'-doelen zoals Beleggen) telt mee als al gecommitteerd.
  const totaalVasteInleg = sumBedrag(doelen.map(d=>({bedrag:d.vasteInleg})));
  // Het extra overschot/tekort wordt alleen naar rato verdeeld over doelen die NIET op 'alleen vast bedrag' staan.
  const verdeelbaar = berekend.filter(b => !b.doel.vastBedrag);
  const totaalBenodigd = round2(verdeelbaar.reduce((s,b)=> s + (b.benodigdPerMaand||0), 0));
  const totaalExtraBenodigd = round2(verdeelbaar.reduce((s,b)=> s + (b.benodigdeExtraInleg||0), 0));
  const extraPot = Math.max(0, (spaarpotDezeMaand||0) - totaalVasteInleg);
  return berekend.map(b=>{
    const vasteInleg = Number(b.doel.vasteInleg)||0;
    if (b.doel.vastBedrag){
      return { ...b, berekendeExtraInleg: 0, werkelijkeInleg: round2(vasteInleg), totaalVasteInleg, totaalBenodigd, totaalExtraBenodigd };
    }
    const extraAandeel = totaalExtraBenodigd>0 ? extraPot * ((b.benodigdeExtraInleg||0)/totaalExtraBenodigd) : 0;
    return { ...b, berekendeExtraInleg: round2(extraAandeel), werkelijkeInleg: round2(vasteInleg + extraAandeel), totaalVasteInleg, totaalBenodigd, totaalExtraBenodigd };
  });
}
function calcScenario(state){
  const scenario = state.meta.scenario;
  const salarisDion = Number(state.personen.dion.salaris)||0;
  const salarisDara = Number(state.personen.dara.salaris)||0;
  const totaalSalaris = salarisDion + salarisDara;
  const inkomenRatioDion = totaalSalaris>0 ? salarisDion/totaalSalaris : 0;
  const inkomenRatioDara = totaalSalaris>0 ? salarisDara/totaalSalaris : 0;
  const s = state[scenario];
  const vasteLastenTotaal = sumEffective(s.gezamenlijk.vasteLasten);
  const variabelTotaal = sumBedrag(s.gezamenlijk.variabel);
  const spaarpotDezeMaand = Number(s.spaarpotDezeMaand)||0;

  let effDion, effDara, zakgeldDion, zakgeldDara, hypotheekBedrag = 0;
  if (scenario === 'voor'){
    const minDion = Number(s.verdeling.minimumDion);
    effDion = Math.max(minDion, inkomenRatioDion);
    effDara = 1 - effDion;
    const pot = vasteLastenTotaal + variabelTotaal + spaarpotDezeMaand;
    zakgeldDion = round2(salarisDion - pot*effDion);
    zakgeldDara = round2(salarisDara - pot*effDara);
  } else {
    const hypDion = Number(s.verdeling.hypotheekDion);
    const hypDara = 1 - hypDion;
    hypotheekBedrag = sumBedrag(s.gezamenlijk.hypotheek);
    const overigePot = vasteLastenTotaal + variabelTotaal + spaarpotDezeMaand;
    zakgeldDion = round2(salarisDion - (hypotheekBedrag*hypDion + overigePot*inkomenRatioDion));
    zakgeldDara = round2(salarisDara - (hypotheekBedrag*hypDara + overigePot*inkomenRatioDara));
    effDion = hypDion; effDara = hypDara;
  }
  function persoonlijk(p, zakgeld){
    const persoonlijkeVasteLasten = sumEffective(s[p].vasteLasten);
    const resterendVoorVariabel = round2(zakgeld - persoonlijkeVasteLasten);
    const variabeleUitgaven = sumBedrag(s[p].variabel);
    const beschikbaarVoorSparen = round2(resterendVoorVariabel - variabeleUitgaven);
    return { persoonlijkeVasteLasten, resterendVoorVariabel, variabeleUitgaven, beschikbaarVoorSparen };
  }
  const dion = { zakgeld: zakgeldDion, ...persoonlijk('dion', zakgeldDion) };
  const dara = { zakgeld: zakgeldDara, ...persoonlijk('dara', zakgeldDara) };
  return {
    totaalSalaris, inkomenRatioDion, inkomenRatioDara,
    vasteLastenTotaal: round2(vasteLastenTotaal + hypotheekBedrag),
    overigeVasteLastenTotaal: vasteLastenTotaal, hypotheekBedrag,
    variabelTotaal, spaarpotDezeMaand, effDion, effDara, dion, dara
  };
}

const STORAGE_KEY = 'dd-budget-planner-v1';
const BACKUP_STORAGE_KEY = 'dd-budget-planner-v1-last-good-backup';
const FIREBASE_CONFIG_STORAGE_KEY = 'dd-budget-planner-firebase-config';
const FIREBASE_SDK_VERSION = '11.10.0';
const FIRESTORE_COLLECTION = 'budgetPlanners';
const FIRESTORE_DOC_ID = 'dion-dara';
const DEFAULT_FIREBASE_CONFIG = {
  apiKey: '',
  authDomain: 'financien-7dd43.firebaseapp.com',
  projectId: 'financien-7dd43',
  appId: ''
};

function isPlainObject(value){
  return value !== null && typeof value === 'object' && !Array.isArray(value);
}

function validateRows(rows, label, errors){
  if (!Array.isArray(rows)){
    errors.push(label + ' moet een lijst zijn.');
    return;
  }
  rows.forEach((row, i)=>{
    if (!isPlainObject(row)) errors.push(label + '[' + i + '] is geen geldige regel.');
  });
}

function validateGoalRows(rows, label, errors){
  if (!Array.isArray(rows)){
    errors.push(label + ' moet een lijst zijn.');
    return;
  }
  rows.forEach((row, i)=>{
    if (!isPlainObject(row)) errors.push(label + '[' + i + '] is geen geldig spaardoel.');
  });
}

function validateBudgetState(candidate){
  const errors = [];
  if (!isPlainObject(candidate)){
    return { ok:false, errors:['Het bestand bevat geen budgetplanner-gegevens.'] };
  }
  ['meta','personen','voor','na','spaardoelen'].forEach(key=>{
    if (!isPlainObject(candidate[key])) errors.push('Ontbrekend of ongeldig onderdeel: ' + key + '.');
  });
  if (errors.length) return { ok:false, errors };

  if (!['voor','na'].includes(candidate.meta.scenario)){
    errors.push('Scenario moet "voor" of "na" zijn.');
  }
  ['dion','dara'].forEach(person=>{
    if (!isPlainObject(candidate.personen[person])) errors.push('Persoon ontbreekt: ' + person + '.');
  });

  ['voor','na'].forEach(scenario=>{
    const s = candidate[scenario];
    if (!isPlainObject(s.verdeling)) errors.push(scenario + '.verdeling ontbreekt.');
    if (!isPlainObject(s.gezamenlijk)) errors.push(scenario + '.gezamenlijk ontbreekt.');
    if (!isPlainObject(s.dion)) errors.push(scenario + '.dion ontbreekt.');
    if (!isPlainObject(s.dara)) errors.push(scenario + '.dara ontbreekt.');
    if (isPlainObject(s.gezamenlijk)){
      validateRows(s.gezamenlijk.vasteLasten, scenario + '.gezamenlijk.vasteLasten', errors);
      validateRows(s.gezamenlijk.variabel, scenario + '.gezamenlijk.variabel', errors);
      if (scenario === 'na') validateRows(s.gezamenlijk.hypotheek, 'na.gezamenlijk.hypotheek', errors);
    }
    ['dion','dara'].forEach(person=>{
      if (isPlainObject(s[person])){
        validateRows(s[person].vasteLasten, scenario + '.' + person + '.vasteLasten', errors);
        validateRows(s[person].variabel, scenario + '.' + person + '.variabel', errors);
      }
    });
  });

  ['gezamenlijk','dion','dara'].forEach(group=>{
    validateGoalRows(candidate.spaardoelen[group], 'spaardoelen.' + group, errors);
  });

  return { ok:errors.length === 0, errors };
}

function loadFirebaseConfig(){
  try{
    const raw = localStorage.getItem(FIREBASE_CONFIG_STORAGE_KEY);
    if (!raw) return {...DEFAULT_FIREBASE_CONFIG};
    return {...DEFAULT_FIREBASE_CONFIG, ...JSON.parse(raw)};
  }catch(e){
    console.error('Firebase-config laden mislukt', e);
    return {...DEFAULT_FIREBASE_CONFIG};
  }
}

function firebaseConfigIsComplete(config){
  return !!(config && config.apiKey && config.authDomain && config.projectId && config.appId);
}

function saveFirebaseConfigFromText(text){
  const parsed = JSON.parse(text);
  const config = {...DEFAULT_FIREBASE_CONFIG, ...parsed};
  if (!firebaseConfigIsComplete(config)){
    throw new Error('Firebase-config mist apiKey, authDomain, projectId of appId.');
  }
  localStorage.setItem(FIREBASE_CONFIG_STORAGE_KEY, JSON.stringify(config));
  return config;
}

const CloudAdapter = {
  app:null, auth:null, db:null, docRef:null, modules:null, unsubscribe:null, user:null,
  status:'Firebase niet verbonden', saveTimer:null, applyingRemote:false, initialized:false,
  config:loadFirebaseConfig(),
  statusText(){ return this.status; },
  isConfigured(){ return firebaseConfigIsComplete(this.config); },
  isConnected(){ return !!(this.db && this.docRef && this.user); },
  async loadModules(){
    if (this.modules) return this.modules;
    const base = `https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}`;
    const [app, firestore, auth] = await Promise.all([
      import(`${base}/firebase-app.js`),
      import(`${base}/firebase-firestore.js`),
      import(`${base}/firebase-auth.js`)
    ]);
    this.modules = {app, firestore, auth};
    return this.modules;
  },
  async connect(interactive=true){
    if (!this.isConfigured()){
      this.status = 'Firebase-config ontbreekt';
      renderCloudStatus();
      return false;
    }
    try{
      this.status = 'Firebase laden...';
      renderCloudStatus();
      const {app, firestore, auth} = await this.loadModules();
      this.app = app.getApps().length ? app.getApps()[0] : app.initializeApp(this.config);
      this.auth = auth.getAuth(this.app);
      this.db = firestore.getFirestore(this.app);
      this.docRef = firestore.doc(this.db, FIRESTORE_COLLECTION, FIRESTORE_DOC_ID);
      if (!this.auth.currentUser && interactive){
        const provider = new auth.GoogleAuthProvider();
        await auth.signInWithPopup(this.auth, provider);
      }
      this.user = this.auth.currentUser;
      if (!this.user){
        this.status = 'Firebase klaar, nog niet ingelogd';
        renderCloudStatus();
        return false;
      }
      this.attachSnapshot();
      this.status = 'Firebase verbonden als ' + (this.user.email || this.user.uid);
      renderCloudStatus();
      return true;
    }catch(e){
      console.error('Firebase verbinden mislukt', e);
      this.status = 'Firebase-fout: ' + (e && e.message ? e.message : e);
      renderCloudStatus();
      return false;
    }
  },
  attachSnapshot(){
    if (this.unsubscribe || !this.docRef) return;
    const {firestore} = this.modules;
    this.unsubscribe = firestore.onSnapshot(this.docRef, snap=>{
      if (!snap.exists()){
        this.status = 'Firebase verbonden, cloud-document is nog leeg';
        renderCloudStatus();
        return;
      }
      const remote = snap.data().state;
      const validation = validateBudgetState(remote);
      if (!validation.ok){
        console.error('Firestore-data ongeldig', validation.errors);
        this.status = 'Firebase-data ongeldig, lokale data behouden';
        renderCloudStatus();
        return;
      }
      if (JSON.stringify(remote) === JSON.stringify(state)) return;
      DataAdapter.backup(state, 'voor Firestore-sync');
      this.applyingRemote = true;
      state = remote;
      window.state = state;
      try{ localSave(state); }catch(e){ console.error('lokale kopie Firestore-data opslaan mislukt', e); }
      this.applyingRemote = false;
      this.status = 'Firebase-data geladen';
      renderActiveTab();
    }, err=>{
      console.error('Firestore live-sync fout', err);
      this.status = 'Firebase live-sync fout: ' + err.message;
      renderCloudStatus();
    });
  },
  queueSave(state){
    if (!this.isConnected() || this.applyingRemote) return;
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(()=> this.saveNow(state), 500);
  },
  async saveNow(state){
    if (!this.isConnected()) return false;
    const validation = validateBudgetState(state);
    if (!validation.ok){
      this.status = 'Niet naar Firebase opgeslagen: lokale data ongeldig';
      renderCloudStatus();
      return false;
    }
    try{
      const {firestore} = this.modules;
      await firestore.setDoc(this.docRef, {
        state,
        updatedAt: firestore.serverTimestamp(),
        updatedBy: this.user.email || this.user.uid
      }, {merge:true});
      this.status = 'Firebase opgeslagen om ' + new Date().toLocaleTimeString('nl-NL');
      renderCloudStatus();
      return true;
    }catch(e){
      console.error('Firestore opslaan mislukt', e);
      this.status = 'Firebase opslaan mislukt: ' + e.message;
      renderCloudStatus();
      return false;
    }
  },
  async signOut(){
    if (this.unsubscribe){ this.unsubscribe(); this.unsubscribe = null; }
    if (this.auth){
      const {auth} = this.modules;
      await auth.signOut(this.auth);
    }
    this.user = null;
    this.status = 'Firebase uitgelogd';
    renderCloudStatus();
  }
};

const DataAdapter = {
  // Lokaal blijft altijd de eerste veiligheidslaag. Firestore is optionele live-sync erbovenop.
  // Firebase Storage is voor losse bestanden; Firestore is de juiste plek voor live app-data.
  // We bewaren dezelfde state-vorm als 1 groot JSON-document per koppel.
  save(state){
    try{
      localSave(state);
      CloudAdapter.queueSave(state);
      return true;
    }catch(e){ console.error('opslaan mislukt', e); return false; }
  },
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const validation = validateBudgetState(parsed);
      if (!validation.ok){
        console.error('opgeslagen data ongeldig', validation.errors);
        return null;
      }
      return parsed;
    }catch(e){ console.error('laden mislukt', e); return null; }
  },
  backup(state, reason){
    try{
      localStorage.setItem(BACKUP_STORAGE_KEY, JSON.stringify({
        savedAt: new Date().toISOString(),
        label: backupLabel(),
        reason,
        state
      }));
      return true;
    }catch(e){ console.error('back-up maken mislukt', e); return false; }
  },
  loadBackup(){
    try{
      const raw = localStorage.getItem(BACKUP_STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ console.error('back-up laden mislukt', e); return null; }
  }
};

// Elk element met data-path krijgt zijn waarde uit/naar de state via getPath/setPath.
function bindInputs(root){
  root.querySelectorAll('[data-path]').forEach(el=>{
    const path = el.dataset.path;
    const type = el.type;
    const raw = getPath(state, path);
    if (type === 'checkbox') el.checked = !!raw;
    else if (el.dataset.percent === 'true') el.value = percentInputValue(raw);
    else el.value = raw === undefined || raw === null ? '' : raw;

    const commit = ()=>{
      let v = el.value;
      if (type === 'number'){
        v = v === '' ? 0 : parseFloat(v.replace(',', '.'));
        if (!Number.isFinite(v)) v = 0;
        if (el.dataset.percent === 'true') v = v / 100;
      }
      if (type === 'checkbox') v = el.checked;
      setPath(state, path, v);
      persist();
      renderActiveTab();
    };
    el.addEventListener('change', commit);
    if (type === 'checkbox') el.addEventListener('click', commit);
  });
}

/* ---------- tabel-editor voor vaste lasten / variabel ---------- */
function sortedRowEntries(rows){
  return (rows||[]).map((row, index)=>({row, index})).sort((a,b)=>{
    const cat = String(a.row.categorie||'').localeCompare(String(b.row.categorie||''), 'nl', {sensitivity:'base'});
    if (cat) return cat;
    const post = String(a.row.post||'').localeCompare(String(b.row.post||''), 'nl', {sensitivity:'base'});
    if (post) return post;
    return a.index - b.index;
  });
}
function moveTargetOptions(basePath){
  const parts = basePath.split('.');
  if (parts.length !== 3 || parts[2] !== 'vasteLasten') return null;
  const scenario = parts[0];
  const current = parts[1];
  return ['gezamenlijk','dion','dara'].map(key=>{
    const label = key === 'gezamenlijk' ? 'Gezamenlijk' : (key === 'dion' ? 'Dion' : 'Dara');
    return `<option value="${scenario}.${key}.vasteLasten" ${key===current?'selected':''}>${label}</option>`;
  }).join('');
}

  const canCollapse = (rows||[]).length > 10;

  const rowsHtml = sortedRowEntries(rows).map(({row:r,index:i})=>{
    const eff = effectiveBedrag(r);
    const jaarHint = r.jaarlijks ? `<div class="progress-label" style="text-align:left;margin-top:2px">≈ ${eur(eff)}/mnd</div>` : '';
    return `

      <tfoot><tr class="tot-row"><td colspan="3">Totaal per maand</td><td class="num">${eur(total)}</td>${withJaar?'<td></td>':''}${moveOptions?'<td></td>':''}<td></td></tr></tfoot>
    </table>
    <button class="ghost small add-row-btn" data-addrow="${basePath}">+ Post toevoegen</button>
  `;
}

function handleTableClicks(root){
  root.querySelectorAll('[data-toggle-list]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const path = btn.dataset.toggleList;
      expandedLists[path] = expandedLists[path] !== true;
      renderActiveTab();
    });
  });
  root.querySelectorAll('[data-addrow]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const path = btn.dataset.addrow;
      const arr = getPath(state, path);
      arr.push({id:uid(), categorie:'', post:'', bedrag:0});
      expandedLists[path] = true;
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [path, idxStr] = splitLastIndex(btn.dataset.remove);
      const arr = getPath(state, path);
      arr.splice(parseInt(idxStr,10), 1);
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-move-row]').forEach(select=>{
    select.addEventListener('change', ()=>{
      const targetPath = select.value;
      const [sourcePath, idxStr] = splitLastIndex(select.dataset.moveRow);
      if (!targetPath || targetPath === sourcePath) return;
      const source = getPath(state, sourcePath);
      const target = getPath(state, targetPath);
      if (!Array.isArray(source) || !Array.isArray(target)) return;
      const idx = parseInt(idxStr, 10);
      const row = source.splice(idx, 1)[0];
      if (!row) return;
      target.push(row);
      expandedLists[sourcePath] = true;
      expandedLists[targetPath] = true;
      persist(); renderActiveTab();
    });
  });
}
function splitLastIndex(pathWithIndex){
  const parts = pathWithIndex.split('.');
  const idx = parts.pop();
  return [parts.join('.'), idx];
}

      allow read, write: if request.auth != null
        &amp;&amp; request.auth.token.email in ['dionvsluijs@gmail.com', 'dara-email@gmail.com'];
    }
  }
}</pre>
    </div>
  `;
  document.getElementById('btnExport').addEventListener('click', ()=>{
    downloadJson('dion-dara-budget-backup-' + new Date().toISOString().slice(0,10) + '.json', state);
  });
  document.getElementById('btnImport').addEventListener('click', ()=> document.getElementById('fileImport').click());
  document.getElementById('fileImport').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const imported = JSON.parse(ev.target.result);
        const validation = validateBudgetState(imported);
        if (!validation.ok){
          alert('Deze back-up is niet geimporteerd:\n\n' + validation.errors.slice(0,6).join('\n'));
          e.target.value = '';
          return;
        }
        if (!confirm('Deze import vervangt alle huidige gegevens. De huidige stand wordt eerst als lokale nood-back-up bewaard. Doorgaan?')){
          e.target.value = '';
          return;
        }
        DataAdapter.backup(state, 'voor import van ' + file.name);
        state = imported; window.state = state;
        persist();
        renderActiveTab();
        alert('Back-up geimporteerd.');
      }catch(err){ alert('Kon dit bestand niet lezen: ' + err.message); }
      e.target.value = '';
    };
    reader.readAsText(file);
  });
  document.getElementById('btnRestoreBackup').addEventListener('click', ()=>{
    const backup = DataAdapter.loadBackup();
    if (!backup || !backup.state){
      alert('Er is nog geen lokale nood-back-up gevonden.');
      return;
    }
    const validation = validateBudgetState(backup.state);
    if (!validation.ok){
      alert('De lokale nood-back-up is ongeldig:\n\n' + validation.errors.slice(0,6).join('\n'));
      return;
    }
    const label = backup.label || backup.savedAt || 'onbekend moment';
    if (confirm('Laatste lokale nood-back-up herstellen van ' + label + '? De huidige stand wordt eerst opnieuw als nood-back-up bewaard.')){
      DataAdapter.backup(state, 'voor herstel lokale nood-back-up');
      state = backup.state; window.state = state;
      persist();
      renderActiveTab();
    }
  });
  document.getElementById('btnReset').addEventListener('click', ()=>{
    if (confirm('Weet je zeker dat je alle gegevens wilt wissen en opnieuw wilt beginnen? De huidige stand wordt eerst als lokale nood-back-up bewaard.')){
      DataAdapter.backup(state, 'voor alles wissen');
      state = defaultState(); window.state = state;
      persist();
      renderActiveTab();
    }
  });
  document.getElementById('btnSaveFirebaseConfig').addEventListener('click', ()=>{
    try{
      CloudAdapter.config = saveFirebaseConfigFromText(document.getElementById('firebaseConfigInput').value);
      CloudAdapter.status = 'Firebase-config opgeslagen';
      renderCloudStatus();
    }catch(err){
      alert('Firebase-config niet opgeslagen: ' + err.message);
    }
  });
  document.getElementById('btnConnectFirebase').addEventListener('click', async ()=>{
    await CloudAdapter.connect(true);
  });
  document.getElementById('btnUploadCloud').addEventListener('click', async ()=>{
    if (!CloudAdapter.isConnected()){
      const connected = await CloudAdapter.connect(true);
      if (!connected) return;
    }
    if (confirm('Lokale stand naar Firestore schrijven? Dit overschrijft het cloud-document voor Dion & Dara.')){
      await CloudAdapter.saveNow(state);
    }
  });
  document.getElementById('btnFirebaseSignOut').addEventListener('click', async ()=>{
    await CloudAdapter.signOut();
  });
}

/* ---------- routing / init ---------- */
function renderActiveTab(){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  document.querySelectorAll('.wrap').forEach(w=> w.classList.toggle('active', w.id === 'tab-'+activeTab));
  document.querySelectorAll('#scenarioToggle button').forEach(b=> b.classList.toggle('active', b.dataset.scenario===state.meta.scenario));

  if (activeTab==='dashboard') renderDashboard();
  else if (activeTab==='gezamenlijk') renderPersonOrJoint('tab-gezamenlijk','gezamenlijk','Gezamenlijk');
  else if (activeTab==='dion') renderPersonOrJoint('tab-dion','dion','Dion');
  else if (activeTab==='dara') renderPersonOrJoint('tab-dara','dara','Dara');
  else if (activeTab==='spaardoelen') renderSpaardoelen();
  else if (activeTab==='data') renderDataTab();

  const root = document.getElementById('tab-'+activeTab);
  bindInputs(root);
  handleTableClicks(root);
  handleGoalClicks(root);
}

document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  renderActiveTab();
});
document.getElementById('scenarioToggle').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if (!btn) return;
  state.meta.scenario = btn.dataset.scenario;
  persist();
  renderActiveTab();
});

renderActiveTab();

</script>
</body>
</html>
